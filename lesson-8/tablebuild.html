<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Wildwest Table Build</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
</head>
<body>
   <table>
    <caption class="titlebackground">ACME Wildwest</caption>
    <thead>
        <tr>
            <th class="pss" scope="col">Period</th>
            <th class="pss" scope="col">Sales</th>
            <th class="pss" scope="col">Sales Goal</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <th scope="month">August</th>
            <td>$3,590</td>
            <td>$4,000</td>
        </tr>
        <tr>
            <th scope="month">September</th>
            <td>$4,420</td>
            <td>$5,000</td>
        </tr>
        <tr>
            <th scope="month">October</th>
            <td>$4,870</td>
            <td>$5,000</td>
        </tr>
        <tr>
            <th scope="month">November</th>
            <td>$8,610</td>
            <td class="mnov">$7,500</td>
        </tr>
        <tr>
            <th class="bf" scope="row">Black Friday</th>
            <td colspan="2">$3,200</td>
        </tr>
        <tr>
            <th scope="month">December</th>
            <td>$6,820</td>
            <td>$7,500</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td class="titlebackground" colspan="3">Compiled 06.09.2022 by Martin Moltó</td>
        </tr>
    </tfoot>
   </table> 
</body>
</html>
